<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Debug Banco de Dados - TiDB</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
</head>

<body class="bg-slate-900 text-white p-8 font-mono">
    <h1 class="text-2xl font-bold mb-4 text-emerald-400">🕵️ Debug Banco de Dados</h1>

    <div class="mb-8">
        <h2 class="text-lg font-bold mb-2">Tabela: USUARIOS</h2>
        <div id="debug-usuarios" class="bg-slate-800 p-4 rounded overflow-auto text-xs">Carregando esquema...</div>
    </div>

    <div class="mb-8">
        <h2 class="text-lg font-bold mb-2">Tabela: PRODUCAO</h2>
        <div id="debug-producao" class="bg-slate-800 p-4 rounded overflow-auto text-xs">Carregando esquema...</div>
    </div>

    <!-- Scripts Essenciais -->
    <script src="js/config.js"></script>
    <script src="js/sistema.js"></script>

    <script>
        async function diagnosticar() {
            try {
                // 1. Verificar Colunas de USUARIOS
                const sqlUser = `
                    SELECT COLUMN_NAME, DATA_TYPE 
                    FROM INFORMATION_SCHEMA.COLUMNS 
                    WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'usuarios'
                `;
                const colsUser = await Sistema.query(sqlUser);
                render('debug-usuarios', colsUser);

                // 2. Verificar Colunas de PRODUCAO
                const sqlProd = `
                    SELECT COLUMN_NAME, DATA_TYPE 
                    FROM INFORMATION_SCHEMA.COLUMNS 
                    WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'producao'
                `;
                const colsProd = await Sistema.query(sqlProd);
                render('debug-producao', colsProd);

            } catch (e) {
                alert("Erro fatal: " + e.message);
                console.error(e);
            }
        }

        function render(id, data) {
            const el = document.getElementById(id);
            if (!data || data.length === 0) {
                el.innerHTML = '<span class="text-rose-400">Tabela não encontrada ou vazia.</span>';
                return;
            }

            // Lista simples de colunas
            const lista = data.map(c => `<span class="text-emerald-300 font-bold">${c.COLUMN_NAME}</span> <span class="text-slate-500">(${c.DATA_TYPE})</span>`).join('<br>');
            el.innerHTML = lista;
            console.log(`[${id}]`, data);
        }

        // Inicia diagnóstico após carregar scripts
        setTimeout(diagnosticar, 1000);
    </script>
</body>

</html>
